<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>audio@inspiren — Issue 01</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  html, body { margin: 0; }
  * { box-sizing: border-box; }
  body { background: var(--surface-mute); padding: 44px 20px 64px; font-family: var(--font-sans); }
  .page {
    max-width: 880px; margin: 0 auto; background: #fff;
    border-radius: 6px; overflow: hidden;
    box-shadow: 0 24px 70px rgba(23,36,59,.12), 0 6px 18px rgba(23,36,59,.07);
  }
  a { color: inherit; }
  .hlink { text-decoration: none; }
  .hlink:hover, .hlink:hover b { text-decoration: underline; text-decoration-color: var(--teal); text-underline-offset: 3px; }
  @media (max-width: 620px) { body { padding: 0; } .page { border-radius: 0; } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="content.js?v=18"></script>
<script type="text/babel" data-presets="react" src="shared.jsx"></script>
<script type="text/babel" data-presets="react" src="direction-a.jsx"></script>
<script type="text/babel" data-presets="react" src="tweaks-panel.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "masthead": "Light",
  "density": "Airy",
  "motifs": "Bold",
  "tldr": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const tw = {
    masthead: String(t.masthead).toLowerCase(),
    density: String(t.density).toLowerCase(),
    motifs: String(t.motifs).toLowerCase(),
    tldr: !!t.tldr,
  };
  return (
    <React.Fragment>
      <div className="page"><window.DirectionA tw={tw} /></div>
      <TweaksPanel>
        <TweakSection label="Masthead" />
        <TweakRadio label="Style" value={t.masthead} options={["Light", "Navy"]}
          onChange={(v) => setTweak("masthead", v)} />
        <TweakSection label="Layout" />
        <TweakRadio label="Density" value={t.density} options={["Compact", "Airy"]}
          onChange={(v) => setTweak("density", v)} />
        <TweakRadio label="Motifs & accent" value={t.motifs} options={["Subtle", "Balanced", "Bold"]}
          onChange={(v) => setTweak("motifs", v)} />
        <TweakSection label="Content" />
        <TweakToggle label="Show TL;DR" value={t.tldr}
          onChange={(v) => setTweak("tldr", v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
